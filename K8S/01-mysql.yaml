apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
stringData:
  root-password: root
---
apiVersion: v1
kind: Service
metadata:
  name: google-classroom-db
spec:
  clusterIP: None
  selector:
    app: google-classroom-db
  ports:
    - port: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: google-classroom-db
spec:
  serviceName: google-classroom-db
  replicas: 1
  selector:
    matchLabels:
      app: google-classroom-db
  template:
    metadata:
      labels:
        app: google-classroom-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: GoogleClassroomDb
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
